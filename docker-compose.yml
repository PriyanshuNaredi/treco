services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file: backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://treco:treco@db/treco
      DATABASE_MODE: postgres
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
        NEXT_PUBLIC_WORKSPACE_ID: default
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: treco
      POSTGRES_PASSWORD: treco
      POSTGRES_DB: treco
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treco"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
